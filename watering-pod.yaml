# ==============================================================================
# Watering Pod 1 - 6-Plant M5Stack Controller
# ==============================================================================
substitutions:
  use_ultrasonic_sensor: "true"

esphome:
  name: watering-pod-1
  friendly_name: "Watering Pod 1"
  includes:
    - pbhub_control.h
  on_boot:
    priority: 600
    then:
      - lambda: 'pbhub.init(id(i2c_bus));'

esp32:
  board: esp32-c6-devkitc-1
  variant: ESP32C6
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: "10.10.7.86"

api:
  encryption:
    key: "YOUR_API_KEY"

ota:
  password: !secret ota_password
  platform: esphome

web_server:
  port: 80
  auth:
    username: !secret web_server_username
    password: !secret web_server_password

i2c:
  id: i2c_bus
  sda: 2
  scl: 1
  frequency: 100kHz

logger:

globals:
  - id: is_auto_running
    type: bool
    initial_value: 'false'

