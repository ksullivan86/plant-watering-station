    mode: restart
    then:
      - delay: !lambda 'return (int)(id(manual_run_time).state * 1000);'
      - switch.turn_off: pump_0
      
  - id: manual_timer_1
    mode: restart
    then:
      - delay: !lambda 'return (int)(id(manual_run_time).state * 1000);'
      - switch.turn_off: pump_1
      
  - id: manual_timer_2
    mode: restart
    then:
      - delay: !lambda 'return (int)(id(manual_run_time).state * 1000);'
      - switch.turn_off: pump_2
      
  - id: manual_timer_3
    mode: restart
    then:
      - delay: !lambda 'return (int)(id(manual_run_time).state * 1000);'
      - switch.turn_off: pump_3
      
  - id: manual_timer_4
    mode: restart
    then:
      - delay: !lambda 'return (int)(id(manual_run_time).state * 1000);'
      - switch.turn_off: pump_4
      
  - id: manual_timer_5
    mode: restart
    then:
      - delay: !lambda 'return (int)(id(manual_run_time).state * 1000);'
      - switch.turn_off: pump_5

  - id: master_pump_auto
    mode: queued
    parameters:
      target_pump: int
    then:
      - if:
          condition:
            and:
              - lambda: 'return id(enable_ultrasonic).state;'
              - lambda: 'return id(enable_tank_safety).state;'
              - lambda: 'return id(tank_level).state >= id(tank_empty_cm).state;' 
          then:
            - logger.log: "Tank empty! Aborting auto pump."
            - script.stop: master_pump_auto

      - if:
          condition:
            or:
              - lambda: 'return target_pump == 0 && !id(auto_enable_0).state;'
              - lambda: 'return target_pump == 1 && !id(auto_enable_1).state;'
              - lambda: 'return target_pump == 2 && !id(auto_enable_2).state;'
              - lambda: 'return target_pump == 3 && !id(auto_enable_3).state;'
              - lambda: 'return target_pump == 4 && !id(auto_enable_4).state;'
              - lambda: 'return target_pump == 5 && !id(auto_enable_5).state;'
          then:
            - logger.log: "Automation disabled. Aborting."
            - script.stop: master_pump_auto

      - globals.set: 
          id: is_auto_running
          value: 'true'
          
      - lambda: |-
          if (target_pump == 0) id(pump_0).turn_on();
          if (target_pump == 1) id(pump_1).turn_on();
          if (target_pump == 2) id(pump_2).turn_on();
          if (target_pump == 3) id(pump_3).turn_on();
          if (target_pump == 4) id(pump_4).turn_on();
          if (target_pump == 5) id(pump_5).turn_on();
          
      - delay: !lambda 'return (int)(id(soak_time_sec).state * 1000);'
      
      - lambda: |-
          if (target_pump == 0) id(pump_0).turn_off();
          if (target_pump == 1) id(pump_1).turn_off();
          if (target_pump == 2) id(pump_2).turn_off();
          if (target_pump == 3) id(pump_3).turn_off();
          if (target_pump == 4) id(pump_4).turn_off();
          if (target_pump == 5) id(pump_5).turn_off();

      - globals.set: 
          id: is_auto_running
          value: 'false'

  - id: water_plant_0
    mode: single 
    then:
      - script.execute: 
          id: master_pump_auto
          target_pump: 0
      - delay: !lambda 'return (int)(id(wait_time_min).state * 60000);'

  - id: water_plant_1
    mode: single 
    then:
      - script.execute: 
          id: master_pump_auto
          target_pump: 1
      - delay: !lambda 'return (int)(id(wait_time_min).state * 60000);'

  - id: water_plant_2
    mode: single 
    then:
      - script.execute: 
          id: master_pump_auto
          target_pump: 2
      - delay: !lambda 'return (int)(id(wait_time_min).state * 60000);'

  - id: water_plant_3
    mode: single 
    then:
      - script.execute: 
          id: master_pump_auto
          target_pump: 3
      - delay: !lambda 'return (int)(id(wait_time_min).state * 60000);'

  - id: water_plant_4
    mode: single 
    then:
      - script.execute: 
          id: master_pump_auto
          target_pump: 4
      - delay: !lambda 'return (int)(id(wait_time_min).state * 60000);'

  - id: water_plant_5
    mode: single 
    then:
      - script.execute: 
          id: master_pump_auto
          target_pump: 5
      - delay: !lambda 'return (int)(id(wait_time_min).state * 60000);'