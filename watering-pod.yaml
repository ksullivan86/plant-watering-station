    turn_on_action:
      - lambda: |-
          pbhub.set_pump(0, true);
          id(cycles_0).publish_state(id(cycles_0).state + 1);
    on_turn_on:
      - if:
          condition:
            and:
              - lambda: 'return !id(is_auto_running);'
              - lambda: 'return id(manual_run_time).state > 0;'
          then:
            - script.execute: manual_timer_0
