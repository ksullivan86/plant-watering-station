# ==============================================================================
# 4. SENSORS (Moisture & Tank)
# ==============================================================================
sensor:
  - platform: template
    name: "CH0: Moisture"
    id: moisture_0
    unit_of_measurement: "%"
    icon: "mdi:water-percent"
    update_interval: 5s
    lambda: |-
      if (!id(port_0_connected).state) return NAN;
      float raw = pbhub.read_moisture(0);
      if (raw == 0) return NAN;
      float percent = ((2110.0 - raw) / 320.0) * 100.0;
      if (percent < 0) return 0.0;
      if (percent > 100) return 100.0;
      return percent;
    on_value:
      then:
        - if:
            condition:
              and: 
                - lambda: 'return id(auto_enable_0).state;'
                - lambda: 'return !isnan(x) && x < id(target_moisture_0).state;'
            then: 
              - script.execute: water_plant_0

