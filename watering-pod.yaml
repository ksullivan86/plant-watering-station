  - platform: template
    name: "Tank: Raw Distance"
    id: tank_level
    entity_category: diagnostic
    unit_of_measurement: "cm"
    update_interval: 5s
    filters:
      - median: 
          window_size: 3
          send_every: 1
          send_first_at: 1
    lambda: |-
      if (!id(enable_ultrasonic).state) return NAN;
      return pbhub.read_ultrasonic();

# ==============================================================================
# 5. DIAGNOSTIC TEXT SENSORS
# ==============================================================================
text_sensor:
  - platform: template
    name: "CH0: Sensor Health"
    entity_category: diagnostic
    update_interval: 5s
    lambda: |-
      if (!id(port_0_connected).state) return {"Disabled"};
      float raw = pbhub.read_moisture(0);
      if (raw == 0) return {"I2C Offline"};
      return {"Healthy"};

  - platform: template
    name: "CH1: Sensor Health"
    entity_category: diagnostic
    update_interval: 5s
    lambda: |-
      if (!id(port_1_connected).state) return {"Disabled"};
      float raw = pbhub.read_moisture(1);
      if (raw == 0) return {"I2C Offline"};
      return {"Healthy"};

  - platform: template
    name: "CH2: Sensor Health"
    entity_category: diagnostic
    update_interval: 5s
    lambda: |-
      if (!id(port_2_connected).state) return {"Disabled"};
      float raw = pbhub.read_moisture(2);
      if (raw == 0) return {"I2C Offline"};
      return {"Healthy"};

  - platform: template
    name: "CH3: Sensor Health"
    entity_category: diagnostic
    update_interval: 5s
    lambda: |-
      if (!id(port_3_connected).state) return {"Disabled"};
      float raw = pbhub.read_moisture(3);
      if (raw == 0) return {"I2C Offline"};
      return {"Healthy"};

  - platform: template
    name: "CH4: Sensor Health"
    entity_category: diagnostic
    update_interval: 5s
    lambda: |-
      if (!id(port_4_connected).state) return {"Disabled"};
      float raw = pbhub.read_moisture(4);
      if (raw == 0) return {"I2C Offline"};
      return {"Healthy"};

  - platform: template
    name: "CH5: Sensor Health"
    entity_category: diagnostic
    update_interval: 5s
    lambda: |-
      if (!id(port_5_connected).state) return {"Disabled"};
      float raw = pbhub.read_moisture(5);
      if (raw == 0) return {"I2C Offline"};
      return {"Healthy"};

  - platform: template
    name: "Tank: Status"
    id: tank_status
    update_interval: 5s
    lambda: |-
      if (!id(enable_ultrasonic).state) return {"Disabled"};
      float dist = id(tank_level).state;
      float empty = id(tank_empty_cm).state;
      float full = id(tank_full_cm).state;
      if (isnan(dist)) return {"Disconnected"};
      float range = empty - full;
      if (range <= 0) return {"Config Error"}; 
      float percent = ((empty - dist) / range) * 100.0;
      if (percent <= 5.0) return {"Empty"};
      if (percent <= 30.0) return {"Low"};
      if (percent <= 70.0) return {"Half"};
      if (percent <= 95.0) return {"High"};
      return {"Full"};

