# ==============================================================================
# Brain Box - Main ESPHome Configuration
# ==============================================================================
substitutions:
  use_ultrasonic_sensor: "true"

esphome:
  name: brain-box
  friendly_name: "Brain Box"
  includes:
    - pbhub_control.h
  on_boot:
    priority: 600
    then:
      - lambda: 'pbhub.init(id(i2c_bus));'

esp32:
  board: esp32-c6-devkitc-1
  variant: ESP32C6
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: "10.10.7.86"

api:
  encryption:
    key: "YOUR_API_KEY"

ota:
  password: !secret ota_password
  platform: esphome

web_server:
  port: 80
  auth:
    username: !secret web_server_username
    password: !secret web_server_password

i2c:
  id: i2c_bus
  sda: 2
  scl: 1
  frequency: 100kHz

logger:

# ==============================================================================
# 1. UI SLIDERS (Saved to flash memory)
# ==============================================================================
number:
  # Moisture Targets (0% to 100%)
  - platform: template
    name: "Plant 1 Target Moisture"
    id: target_moisture_1
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 40
    unit_of_measurement: "%"
    optimistic: true
    restore_value: true

  - platform: template
    name: "Plant 2 Target Moisture"
    id: target_moisture_2
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 40
    unit_of_measurement: "%"
    optimistic: true
    restore_value: true

  - platform: template
    name: "Plant 3 Target Moisture"
    id: target_moisture_3
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 40
    unit_of_measurement: "%"
    optimistic: true
    restore_value: true

  - platform: template
    name: "Plant 4 Target Moisture"
    id: target_moisture_4
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 40
    unit_of_measurement: "%"
    optimistic: true
    restore_value: true

  # Automation Timing
  - platform: template
    name: "Auto-Soak Time (Seconds)"
    id: soak_time_sec
    min_value: 1
    max_value: 30
    step: 1
    initial_value: 5
    optimistic: true
    restore_value: true

  - platform: template
    name: "Auto-Wait Time (Minutes)"
    id: wait_time_min
    min_value: 1
    max_value: 60
    step: 1
    initial_value: 10
    optimistic: true
    restore_value: true

  # Manual Control Timing
  - platform: template
    name: "Manual Pump Run Timer (0=Infinite)"
    id: manual_run_time
    min_value: 0
    max_value: 120
    step: 1
    initial_value: 10
    optimistic: true
    restore_value: true

  # Water Level Calibration
  - platform: template
    name: "Tank EMPTY Distance (cm)"
    id: tank_empty_cm
    min_value: 1
    max_value: 100
    step: 1
    initial_value: 20
    optimistic: true
    restore_value: true

  - platform: template
    name: "Tank FULL Distance (cm)"
    id: tank_full_cm
    min_value: 1
    max_value: 100
    step: 1
    initial_value: 3
    optimistic: true
    restore_value: true

# ==============================================================================
# 2. UI TOGGLES (Port Status & Automation)
# ==============================================================================
switch:
  # --- PORT CONNECTION STATUS ---
  # Keep these OFF in Home Assistant for empty ports to silence ghost data
  - platform: template
    name: "Port 1 Connected"
    id: port_1_connected
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    name: "Port 2 Connected"
    id: port_2_connected
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    name: "Port 3 Connected"
    id: port_3_connected
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    name: "Port 4 Connected"
    id: port_4_connected
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

  # --- AUTOMATION TOGGLES ---
  - platform: template
    name: "Enable Automation: Plant 1"
    id: auto_enable_1
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    name: "Enable Automation: Plant 2"
    id: auto_enable_2
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    name: "Enable Automation: Plant 3"
    id: auto_enable_3
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    name: "Enable Automation: Plant 4"
    id: auto_enable_4
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

# ==============================================================================
# 3. MANUAL PUMP CONTROLS
# ==============================================================================
  - platform: template
    name: "Manual Pump 1"
    id: manual_pump_1
    turn_on_action:
      - lambda: 'pbhub.set_pump(0, true);'
      - if:
          condition:
            lambda: 'return id(manual_run_time).state > 0;'
          then:
            - delay: !lambda 'return (int)(id(manual_run_time).state * 1000);'
            - lambda: 'pbhub.set_pump(0, false);'
            - switch.template.publish:
                id: manual_pump_1
                state: OFF
    turn_off_action:
      - lambda: 'pbhub.set_pump(0, false);'

  - platform: template
    name: "Manual Pump 2"
    id: manual_pump_2
    turn_on_action:
      - lambda: 'pbhub.set_pump(1, true);'
      - if:
          condition:
            lambda: 'return id(manual_run_time).state > 0;'
          then:
            - delay: !lambda 'return (int)(id(manual_run_time).state * 1000);'
            - lambda: 'pbhub.set_pump(1, false);'
            - switch.template.publish:
                id: manual_pump_2
                state: OFF
    turn_off_action:
      - lambda: 'pbhub.set_pump(1, false);'

  - platform: template
    name: "Manual Pump 3"
    id: manual_pump_3
    turn_on_action:
      - lambda: 'pbhub.set_pump(2, true);'
      - if:
          condition:
            lambda: 'return id(manual_run_time).state > 0;'
          then:
            - delay: !lambda 'return (int)(id(manual_run_time).state * 1000);'
            - lambda: 'pbhub.set_pump(2, false);'
            - switch.template.publish:
                id: manual_pump_3
                state: OFF
    turn_off_action:
      - lambda: 'pbhub.set_pump(2, false);'

  - platform: template
    name: "Manual Pump 4"
    id: manual_pump_4
    turn_on_action:
      - lambda: 'pbhub.set_pump(3, true);'
      - if:
          condition:
            lambda: 'return id(manual_run_time).state > 0;'
          then:
            - delay: !lambda 'return (int)(id(manual_run_time).state * 1000);'
            - lambda: 'pbhub.set_pump(3, false);'
            - switch.template.publish:
                id: manual_pump_4
                state: OFF
    turn_off_action:
      - lambda: 'pbhub.set_pump(3, false);'

# ==============================================================================
# 4. IDENTIFY BUTTONS (1-Second Blip)
# ==============================================================================
button:
  - platform: template
    name: "Identify Pump 1"
    on_press:
      - lambda: 'pbhub.set_pump(0, true);'
      - delay: 1s
      - lambda: 'pbhub.set_pump(0, false);'

  - platform: template
    name: "Identify Pump 2"
    on_press:
      - lambda: 'pbhub.set_pump(1, true);'
      - delay: 1s
      - lambda: 'pbhub.set_pump(1, false);'

  - platform: template
    name: "Identify Pump 3"
    on_press:
      - lambda: 'pbhub.set_pump(2, true);'
      - delay: 1s
      - lambda: 'pbhub.set_pump(2, false);'

  - platform: template
    name: "Identify Pump 4"
    on_press:
      - lambda: 'pbhub.set_pump(3, true);'
      - delay: 1s
      - lambda: 'pbhub.set_pump(3, false);'

# ==============================================================================
# 5. SENSORS (Moisture & Smart Water Level)
# ==============================================================================
sensor:
  - platform: template
    name: "Plant 1 Moisture"
    id: moisture_1
    unit_of_measurement: "%"
    icon: "mdi:water-percent"
    update_interval: 5s
    lambda: |-
      if (!id(port_1_connected).state) return NAN;
      float raw = pbhub.read_moisture(0);
      if (raw == 0) return NAN;
      // Convert raw 2110 (Dry) and 1790 (Wet) into a clean 0-100% scale
      float percent = ((2110.0 - raw) / 320.0) * 100.0;
      if (percent < 0) return 0.0;
      if (percent > 100) return 100.0;
      return percent;
    on_value:
      then:
        - if:
            condition:
              and:
                - lambda: 'return id(auto_enable_1).state;' 
                - lambda: 'return !isnan(x) && x < id(target_moisture_1).state;' 
            then:
              - script.execute: water_plant_1

  - platform: template
    name: "Plant 2 Moisture"
    id: moisture_2
    unit_of_measurement: "%"
    icon: "mdi:water-percent"
    update_interval: 5s
    lambda: |-
      if (!id(port_2_connected).state) return NAN;
      float raw = pbhub.read_moisture(1);
      if (raw == 0) return NAN;
      float percent = ((2110.0 - raw) / 320.0) * 100.0;
      if (percent < 0) return 0.0;
      if (percent > 100) return 100.0;
      return percent;
    on_value:
      then:
        - if:
            condition:
              and:
                - lambda: 'return id(auto_enable_2).state;'
                - lambda: 'return !isnan(x) && x < id(target_moisture_2).state;'
            then:
              - script.execute: water_plant_2

  - platform: template
    name: "Plant 3 Moisture"
    id: moisture_3
    unit_of_measurement: "%"
    icon: "mdi:water-percent"
    update_interval: 5s
    lambda: |-
      if (!id(port_3_connected).state) return NAN;
      float raw = pbhub.read_moisture(2);
      if (raw == 0) return NAN;
      float percent = ((2110.0 - raw) / 320.0) * 100.0;
      if (percent < 0) return 0.0;
      if (percent > 100) return 100.0;
      return percent;
    on_value:
      then:
        - if:
            condition:
              and:
                - lambda: 'return id(auto_enable_3).state;'
                - lambda: 'return !isnan(x) && x < id(target_moisture_3).state;'
            then:
              - script.execute: water_plant_3

  - platform: template
    name: "Plant 4 Moisture"
    id: moisture_4
    unit_of_measurement: "%"
    icon: "mdi:water-percent"
    update_interval: 5s
    lambda: |-
      if (!id(port_4_connected).state) return NAN;
      float raw = pbhub.read_moisture(3);
      if (raw == 0) return NAN;
      float percent = ((2110.0 - raw) / 320.0) * 100.0;
      if (percent < 0) return 0.0;
      if (percent > 100) return 100.0;
      return percent;
    on_value:
      then:
        - if:
            condition:
              and:
                - lambda: 'return id(auto_enable_4).state;'
                - lambda: 'return !isnan(x) && x < id(target_moisture_4).state;'
            then:
              - script.execute: water_plant_4

  - platform: template
    name: "Main Tank Raw Distance"
    id: tank_level
    unit_of_measurement: "cm"
    update_interval: 5s
    lambda: 'return pbhub.read_ultrasonic();'

text_sensor:
  - platform: template
    name: "Main Tank Status"
    id: tank_status
    update_interval: 5s
    lambda: |-
      float dist = id(tank_level).state;
      float empty = id(tank_empty_cm).state;
      float full = id(tank_full_cm).state;

      if (isnan(dist)) return {"Disconnected"};

      float range = empty - full;
      if (range <= 0) return {"Config Error"}; 
      
      float percent = ((empty - dist) / range) * 100.0;

      if (percent <= 5.0) return {"Empty"};
      if (percent <= 30.0) return {"Low"};
      if (percent <= 70.0) return {"Half"};
      if (percent <= 95.0) return {"High"};
      return {"Full"};

# ==============================================================================
# 6. AUTOMATION LOGIC (Queued Power Management)
# ==============================================================================
script:
  - id: master_pump_auto
    mode: queued
    parameters:
      target_pump: int
    then:
      - if:
          condition:
            and:
              - lambda: 'return "${use_ultrasonic_sensor}" == "true";'
              - lambda: 'return id(tank_level).state >= id(tank_empty_cm).state;' 
          then:
            - logger.log: "Tank empty! Aborting auto pump."
            - script.stop: master_pump_auto
            
      - lambda: |-
          if (target_pump == 1) pbhub.set_pump(0, true);
          if (target_pump == 2) pbhub.set_pump(1, true);
          if (target_pump == 3) pbhub.set_pump(2, true);
          if (target_pump == 4) pbhub.set_pump(3, true);
          
      - delay: !lambda 'return (int)(id(soak_time_sec).state * 1000);'
      
      - lambda: |-
          if (target_pump == 1) pbhub.set_pump(0, false);
          if (target_pump == 2) pbhub.set_pump(1, false);
          if (target_pump == 3) pbhub.set_pump(2, false);
          if (target_pump == 4) pbhub.set_pump(3, false);

  - id: water_plant_1
    mode: single 
    then:
      - script.execute:
          id: master_pump_auto
          target_pump: 1
      - delay: !lambda 'return (int)(id(wait_time_min).state * 60000);'

  - id: water_plant_2
    mode: single
    then:
      - script.execute:
          id: master_pump_auto
          target_pump: 2
      - delay: !lambda 'return (int)(id(wait_time_min).state * 60000);'

  - id: water_plant_3
    mode: single
    then:
      - script.execute:
          id: master_pump_auto
          target_pump: 3
      - delay: !lambda 'return (int)(id(wait_time_min).state * 60000);'

  - id: water_plant_4
    mode: single
    then:
      - script.execute:
          id: master_pump_auto
          target_pump: 4
      - delay: !lambda 'return (int)(id(wait_time_min).state * 60000);'