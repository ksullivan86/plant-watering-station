# ==============================================================================
# Brain Box - Main ESPHome Configuration
# ==============================================================================
substitutions:
  use_ultrasonic_sensor: "true"

esphome:
  name: brain-box
  friendly_name: "Brain Box"
  includes:
    - pbhub_control.h
  on_boot:
    priority: 600
    then:
      - lambda: 'pbhub.init(id(i2c_bus));'

esp32:
  board: esp32-c6-devkitc-1
  variant: ESP32C6
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: "10.10.7.86"

api:
  encryption:
    key: "YOUR_API_KEY"

ota:
  password: !secret ota_password
  platform: esphome

web_server:
  port: 80
  auth:
    username: !secret web_server_username
    password: !secret web_server_password

i2c:
  id: i2c_bus
  sda: 2
  scl: 1
  frequency: 100kHz

logger:

globals:
  - id: is_auto_running
    type: bool
    initial_value: 'false'

# ==============================================================================
# 1. UI SLIDERS (Moved to the HA "Configuration" Box)
# ==============================================================================
number:
  - platform: template
    name: "P1: Target Moisture"
    id: target_moisture_1
    entity_category: config
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 40
    unit_of_measurement: "%"
    optimistic: true
    restore_value: true

  - platform: template
    name: "P2: Target Moisture"
    id: target_moisture_2
    entity_category: config
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 40
    unit_of_measurement: "%"
    optimistic: true
    restore_value: true

  - platform: template
    name: "P3: Target Moisture"
    id: target_moisture_3
    entity_category: config
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 40
    unit_of_measurement: "%"
    optimistic: true
    restore_value: true

  - platform: template
    name: "P4: Target Moisture"
    id: target_moisture_4
    entity_category: config
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 40
    unit_of_measurement: "%"
    optimistic: true
    restore_value: true

  - platform: template
    name: "All: Auto-Soak Time (Seconds)"
    id: soak_time_sec
    entity_category: config
    min_value: 1
    max_value: 30
    step: 1
    initial_value: 5
    optimistic: true
    restore_value: true

  - platform: template
    name: "All: Auto-Wait Time (Minutes)"
    id: wait_time_min
    entity_category: config
    min_value: 1
    max_value: 60
    step: 1
    initial_value: 10
    optimistic: true
    restore_value: true

  - platform: template
    name: "All: Manual Pump Run Timer (0=Infinite)"
    id: manual_run_time
    entity_category: config
    min_value: 0
    max_value: 120
    step: 1
    initial_value: 10
    optimistic: true
    restore_value: true

  - platform: template
    name: "Tank: EMPTY Distance Calibration (cm)"
    id: tank_empty_cm
    entity_category: config
    min_value: 1
    max_value: 100
    step: 1
    initial_value: 20
    optimistic: true
    restore_value: true

  - platform: template
    name: "Tank: FULL Distance Calibration (cm)"
    id: tank_full_cm
    entity_category: config
    min_value: 1
    max_value: 100
    step: 1
    initial_value: 3
    optimistic: true
    restore_value: true

# ==============================================================================
# 2. UI TOGGLES (Port Status & Automation)
# ==============================================================================
switch:
  - platform: template
    name: "Enable Ultrasonic Sensor"
    id: enable_ultrasonic
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    name: "Stop Pumps if Tank is Empty"
    id: enable_tank_safety
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    name: "P1: Port Connected"
    id: port_1_connected
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    name: "P2: Port Connected"
    id: port_2_connected
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    name: "P3: Port Connected"
    id: port_3_connected
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    name: "P4: Port Connected"
    id: port_4_connected
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

  # --- AUTOMATION TOGGLES (Kept on main dashboard) ---
  - platform: template
    name: "P1: Enable Automation"
    id: auto_enable_1
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_off_action:
      - script.stop: water_plant_1
      - switch.turn_off: pump_1

  - platform: template
    name: "P2: Enable Automation"
    id: auto_enable_2
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_off_action:
      - script.stop: water_plant_2
      - switch.turn_off: pump_2

  - platform: template
    name: "P3: Enable Automation"
    id: auto_enable_3
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_off_action:
      - script.stop: water_plant_3
      - switch.turn_off: pump_3

  - platform: template
    name: "P4: Enable Automation"
    id: auto_enable_4
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_off_action:
      - script.stop: water_plant_4
      - switch.turn_off: pump_4

# ==============================================================================
# 3. UNIFIED PUMP SWITCHES (True State & Manual Timers)
# ==============================================================================
  - platform: template
    name: "P1: Pump"
    id: pump_1
    icon: "mdi:water-pump"
    optimistic: true
    turn_on_action:
      - lambda: 'pbhub.set_pump(0, true);'
    on_turn_on:
      - if:
          condition:
            and:
              - lambda: 'return !id(is_auto_running);'
              - lambda: 'return id(manual_run_time).state > 0;'
          then:
            - script.execute: manual_timer_1
    turn_off_action:
      - script.stop: manual_timer_1
      - lambda: 'pbhub.set_pump(0, false);'

  - platform: template
    name: "P2: Pump"
    id: pump_2
    icon: "mdi:water-pump"
    optimistic: true
    turn_on_action:
      - lambda: 'pbhub.set_pump(1, true);'
    on_turn_on:
      - if:
          condition:
            and:
              - lambda: 'return !id(is_auto_running);'
              - lambda: 'return id(manual_run_time).state > 0;'
          then:
            - script.execute: manual_timer_2
    turn_off_action:
      - script.stop: manual_timer_2
      - lambda: 'pbhub.set_pump(1, false);'

  - platform: template
    name: "P3: Pump"
    id: pump_3
    icon: "mdi:water-pump"
    optimistic: true
    turn_on_action:
      - lambda: 'pbhub.set_pump(2, true);'
    on_turn_on:
      - if:
          condition:
            and:
              - lambda: 'return !id(is_auto_running);'
              - lambda: 'return id(manual_run_time).state > 0;'
          then:
            - script.execute: manual_timer_3
    turn_off_action:
      - script.stop: manual_timer_3
      - lambda: 'pbhub.set_pump(2, false);'

  - platform: template
    name: "P4: Pump"
    id: pump_4
    icon: "mdi:water-pump"
    optimistic: true
    turn_on_action:
      - lambda: 'pbhub.set_pump(3, true);'
    on_turn_on:
      - if:
          condition:
            and:
              - lambda: 'return !id(is_auto_running);'
              - lambda: 'return id(manual_run_time).state > 0;'
          then:
            - script.execute: manual_timer_4
    turn_off_action:
      - script.stop: manual_timer_4
      - lambda: 'pbhub.set_pump(3, false);'

# ==============================================================================
# 4. IDENTIFY BUTTONS (Moved to config)
# ==============================================================================
button:
  - platform: template
    name: "P1: Identify Pump"
    entity_category: config
    on_press:
      - if:
          condition:
            lambda: 'return !id(pump_1).state;' 
          then:
            - lambda: 'pbhub.set_pump(0, true);'
            - delay: 1s
            - lambda: 'pbhub.set_pump(0, false);'

  - platform: template
    name: "P2: Identify Pump"
    entity_category: config
    on_press:
      - if:
          condition:
            lambda: 'return !id(pump_2).state;'
          then:
            - lambda: 'pbhub.set_pump(1, true);'
            - delay: 1s
            - lambda: 'pbhub.set_pump(1, false);'

  - platform: template
    name: "P3: Identify Pump"
    entity_category: config
    on_press:
      - if:
          condition:
            lambda: 'return !id(pump_3).state;'
          then:
            - lambda: 'pbhub.set_pump(2, true);'
            - delay: 1s
            - lambda: 'pbhub.set_pump(2, false);'

  - platform: template
    name: "P4: Identify Pump"
    entity_category: config
    on_press:
      - if:
          condition:
            lambda: 'return !id(pump_4).state;'
          then:
            - lambda: 'pbhub.set_pump(3, true);'
            - delay: 1s
            - lambda: 'pbhub.set_pump(3, false);'

# ==============================================================================
# 5. SENSORS (Moisture & Smart Water Level)
# ==============================================================================
sensor:
  - platform: template
    name: "P1: Moisture"
    id: moisture_1
    unit_of_measurement: "%"
    icon: "mdi:water-percent"
    update_interval: 5s
    lambda: |-
      if (!id(port_1_connected).state) return NAN;
      float raw = pbhub.read_moisture(0);
      if (raw == 0) return NAN;
      float percent = ((2110.0 - raw) / 320.0) * 100.0;
      if (percent < 0) return 0.0;
      if (percent > 100) return 100.0;
      return percent;
    on_value:
      then:
        - if:
            condition:
              and:
                - lambda: 'return id(auto_enable_1).state;' 
                - lambda: 'return !isnan(x) && x < id(target_moisture_1).state;' 
            then:
              - script.execute: water_plant_1

  - platform: template
    name: "P2: Moisture"
    id: moisture_2
    unit_of_measurement: "%"
    icon: "mdi:water-percent"
    update_interval: 5s
    lambda: |-
      if (!id(port_2_connected).state) return NAN;
      float raw = pbhub.read_moisture(1);
      if (raw == 0) return NAN;
      float percent = ((2110.0 - raw) / 320.0) * 100.0;
      if (percent < 0) return 0.0;
      if (percent > 100) return 100.0;
      return percent;
    on_value:
      then:
        - if:
            condition:
              and:
                - lambda: 'return id(auto_enable_2).state;'
                - lambda: 'return !isnan(x) && x < id(target_moisture_2).state;'
            then:
              - script.execute: water_plant_2

  - platform: template
    name: "P3: Moisture"
    id: moisture_3
    unit_of_measurement: "%"
    icon: "mdi:water-percent"
    update_interval: 5s
    lambda: |-
      if (!id(port_3_connected).state) return NAN;
      float raw = pbhub.read_moisture(2);
      if (raw == 0) return NAN;
      float percent = ((2110.0 - raw) / 320.0) * 100.0;
      if (percent < 0) return 0.0;
      if (percent > 100) return 100.0;
      return percent;
    on_value:
      then:
        - if:
            condition:
              and:
                - lambda: 'return id(auto_enable_3).state;'
                - lambda: 'return !isnan(x) && x < id(target_moisture_3).state;'
            then:
              - script.execute: water_plant_3

  - platform: template
    name: "P4: Moisture"
    id: moisture_4
    unit_of_measurement: "%"
    icon: "mdi:water-percent"
    update_interval: 5s
    lambda: |-
      if (!id(port_4_connected).state) return NAN;
      float raw = pbhub.read_moisture(3);
      if (raw == 0) return NAN;
      float percent = ((2110.0 - raw) / 320.0) * 100.0;
      if (percent < 0) return 0.0;
      if (percent > 100) return 100.0;
      return percent;
    on_value:
      then:
        - if:
            condition:
              and:
                - lambda: 'return id(auto_enable_4).state;'
                - lambda: 'return !isnan(x) && x < id(target_moisture_4).state;'
            then:
              - script.execute: water_plant_4

  - platform: template
    name: "Tank: Raw Distance"
    id: tank_level
    entity_category: diagnostic
    unit_of_measurement: "cm"
    update_interval: 5s
    # Added Median filter to ignore water ripples
    filters:
      - median:
          window_size: 3
          send_every: 1
          send_first_at: 1
    lambda: |-
      if (!id(enable_ultrasonic).state) return NAN;
      return pbhub.read_ultrasonic();

text_sensor:
  - platform: template
    name: "Tank: Status"
    id: tank_status
    update_interval: 5s
    lambda: |-
      if (!id(enable_ultrasonic).state) return {"Disabled"};
      
      float dist = id(tank_level).state;
      float empty = id(tank_empty_cm).state;
      float full = id(tank_full_cm).state;

      if (isnan(dist)) return {"Disconnected"};

      float range = empty - full;
      if (range <= 0) return {"Config Error"}; 
      
      float percent = ((empty - dist) / range) * 100.0;

      if (percent <= 5.0) return {"Empty"};
      if (percent <= 30.0) return {"Low"};
      if (percent <= 70.0) return {"Half"};
      if (percent <= 95.0) return {"High"};
      return {"Full"};

# ==============================================================================
# 6. AUTOMATION LOGIC & TIMERS
# ==============================================================================
script:
  - id: manual_timer_1
    mode: restart
    then:
      - delay: !lambda 'return (int)(id(manual_run_time).state * 1000);'
      - switch.turn_off: pump_1

  - id: manual_timer_2
    mode: restart
    then:
      - delay: !lambda 'return (int)(id(manual_run_time).state * 1000);'
      - switch.turn_off: pump_2

  - id: manual_timer_3
    mode: restart
    then:
      - delay: !lambda 'return (int)(id(manual_run_time).state * 1000);'
      - switch.turn_off: pump_3

  - id: manual_timer_4
    mode: restart
    then:
      - delay: !lambda 'return (int)(id(manual_run_time).state * 1000);'
      - switch.turn_off: pump_4

  - id: master_pump_auto
    mode: queued
    parameters:
      target_pump: int
    then:
      - if:
          condition:
            and:
              - lambda: 'return id(enable_ultrasonic).state;'
              - lambda: 'return id(enable_tank_safety).state;'
              - lambda: 'return id(tank_level).state >= id(tank_empty_cm).state;' 
          then:
            - logger.log: "Tank empty! Aborting auto pump."
            - script.stop: master_pump_auto

      - if:
          condition:
            or:
              - lambda: 'return target_pump == 1 && !id(auto_enable_1).state;'
              - lambda: 'return target_pump == 2 && !id(auto_enable_2).state;'
              - lambda: 'return target_pump == 3 && !id(auto_enable_3).state;'
              - lambda: 'return target_pump == 4 && !id(auto_enable_4).state;'
          then:
            - logger.log: "Automation disabled for this pump. Aborting."
            - script.stop: master_pump_auto

      - globals.set:
          id: is_auto_running
          value: 'true'
          
      - lambda: |-
          if (target_pump == 1) id(pump_1).turn_on();
          if (target_pump == 2) id(pump_2).turn_on();
          if (target_pump == 3) id(pump_3).turn_on();
          if (target_pump == 4) id(pump_4).turn_on();
          
      - delay: !lambda 'return (int)(id(soak_time_sec).state * 1000);'
      
      - lambda: |-
          if (target_pump == 1) id(pump_1).turn_off();
          if (target_pump == 2) id(pump_2).turn_off();
          if (target_pump == 3) id(pump_3).turn_off();
          if (target_pump == 4) id(pump_4).turn_off();

      - globals.set:
          id: is_auto_running
          value: 'false'

  - id: water_plant_1
    mode: single 
    then:
      - script.execute:
          id: master_pump_auto
          target_pump: 1
      - delay: !lambda 'return (int)(id(wait_time_min).state * 60000);'

  - id: water_plant_2
    mode: single
    then:
      - script.execute:
          id: master_pump_auto
          target_pump: 2
      - delay: !lambda 'return (int)(id(wait_time_min).state * 60000);'

  - id: water_plant_3
    mode: single
    then:
      - script.execute:
          id: master_pump_auto
          target_pump: 3
      - delay: !lambda 'return (int)(id(wait_time_min).state * 60000);'

  - id: water_plant_4
    mode: single
    then:
      - script.execute:
          id: master_pump_auto
          target_pump: 4
      - delay: !lambda 'return (int)(id(wait_time_min).state * 60000);'